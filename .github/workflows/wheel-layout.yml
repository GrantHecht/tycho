name: wheel-layout

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tychopy/**'
      - '.github/workflows/wheel-layout.yml'
  push:
    branches: [main]

concurrency:
  group: wheel-layout-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Compile _tychopy into a wheel exactly once. Every downstream job consumes
  # this artifact, so the (slow) C++ build never runs more than one time per
  # workflow invocation.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.13'
          activate-environment: tycho

      - name: Install conda clang toolchain
        shell: bash -el {0}
        # scikit-build-core picks CC/CXX from the activated conda env; the
        # conda-forge clang toolchain pins libstdc++ so the wheel imports
        # cleanly on any glibc-compatible distro.
        run: |
          conda install -n tycho -c conda-forge -y \
            clangxx_linux-64 clang_linux-64 \
            libstdcxx-devel_linux-64 sysroot_linux-64 \
            ninja

      - name: Install MKL via apt repository
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      - name: Build wheel
        shell: bash -el {0}
        run: |
          source /opt/intel/oneapi/setvars.sh
          pip wheel . --no-deps -w /tmp/wheels

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tycho-wheel
          path: /tmp/wheels/tychopy-*.whl
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Static layout invariants on the packaged wheel (no import / no build).
  # ---------------------------------------------------------------------------
  inspect-layout:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4   # for scripts/inspect_wheel_layout.py
      - uses: actions/download-artifact@v4
        with:
          name: tycho-wheel
          path: /tmp/wheels
      - name: Inspect wheel layout
        run: |
          set -euo pipefail
          wheel=$(ls /tmp/wheels/tychopy-*.whl | head -1)
          if [ -z "$wheel" ]; then
            echo "::error::no wheel artifact found"
            exit 1
          fi
          # Layout assertions are implemented in Python (see the script
          # for the negative/positive invariants). Avoids bash + awk
          # gotchas — an inline `awk 'NR>2 {print $1}'` previously
          # dropped the first zip entry because python -m zipfile -l
          # emits only one header row, not two.
          python scripts/inspect_wheel_layout.py "$wheel"

  # ---------------------------------------------------------------------------
  # Prove the bundled .so imports with no LD_LIBRARY_PATH help, from a fresh
  # venv outside the conda env.
  # ---------------------------------------------------------------------------
  smoke-import:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tycho-wheel
          path: /tmp/wheels
      # The wheel is cp313-cp313; ubuntu-latest's default Python is 3.12,
      # which would refuse the wheel.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Smoke-test wheel import (fresh venv, no setvars.sh)
        # This step deliberately does NOT source /opt/intel/oneapi/setvars.sh.
        # setvars.sh exports LD_LIBRARY_PATH containing the same MKL/iomp5
        # dirs that the wheel's .so bakes into RUNPATH, which would mask any
        # rpath bug. The point of this gate is exactly to surface such a
        # bug — the .so must import unaided by LD_LIBRARY_PATH.
        run: |
          set -euo pipefail
          wheel=$(ls /tmp/wheels/tychopy-*.whl | head -1)
          python3.13 -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip
          /tmp/wheel-venv/bin/pip install numpy
          /tmp/wheel-venv/bin/pip install "$wheel"
          so=$(ls /tmp/wheel-venv/lib/python3.13/site-packages/_tychopy*.so)
          echo "Bundled .so RUNPATH (informational):"
          readelf -d "$so" | grep -E 'RPATH|RUNPATH' || true
          /tmp/wheel-venv/bin/python -c "import _tychopy; import tychopy; print(_tychopy.__file__)"

  # ---------------------------------------------------------------------------
  # Python unit-test suite against the installed wheel. The test tree is copied
  # out of the checkout and run from /tmp so the source ./tychopy package is NOT
  # on sys.path — both `import tychopy` (pure-Python layer) and `import _tychopy`
  # (the .so) therefore resolve to the venv site-packages, i.e. the wheel. Like
  # smoke-import, this runs unaided by setvars.sh, so a green run proves the
  # suite passes against the packaged artifact exactly as a user would import it.
  # ---------------------------------------------------------------------------
  pytest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4   # for the tychopy/test/ sources
      - uses: actions/download-artifact@v4
        with:
          name: tycho-wheel
          path: /tmp/wheels
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install wheel + test dependencies
        run: |
          set -euo pipefail
          # Expect exactly one wheel (mirrors the inspect-layout guard); a zero
          # or multi-wheel artifact is a build bug, so fail loudly rather than
          # silently picking one.
          shopt -s nullglob
          wheels=(/tmp/wheels/tychopy-*.whl)
          [ "${#wheels[@]}" -eq 1 ] || { echo "::error::expected one wheel, found ${#wheels[@]}"; exit 1; }
          wheel="${wheels[0]}"
          python3.13 -m venv /tmp/test-venv
          /tmp/test-venv/bin/pip install --upgrade pip
          # Test extra (pytest + numpy/scipy/matplotlib/spiceypy) from the
          # wheel's own [test] optional-dependency group, then the wheel.
          /tmp/test-venv/bin/pip install "${wheel}[test]"
      - name: Run pytest suite (against the installed wheel)
        env:
          MPLBACKEND: Agg
        run: |
          set -euo pipefail
          # Copy the tests (and any in-tree fixtures) out of the checkout, then
          # run from /tmp so ./tychopy source is not importable — the suite must
          # exercise the wheel's tychopy + _tychopy, not the source tree.
          cp -r tychopy/test /tmp/suite
          cd /tmp
          /tmp/test-venv/bin/python -m pytest \
            --import-mode=importlib /tmp/suite --durations=10
