name: wheel-layout

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tychopy/**'
      - '.github/workflows/wheel-layout.yml'
  push:
    branches: [main]

concurrency:
  group: wheel-layout-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Build the wheel once, then immediately exercise it (import smoke test +
  # pytest suite) on this same runner.
  #
  # Why import/test live here and not in a separate runner: the bundled
  # _tychopy.so bakes ABSOLUTE rpaths to this runner's conda env and oneAPI
  # install dirs (…/miniconda/envs/tycho/lib, …/oneapi/{mkl,compiler}/…/lib)
  # for libmkl_rt / libiomp5. A bare downstream runner that only downloads the
  # wheel has none of those dirs, so `import _tychopy` fails with
  # "libiomp5.so: cannot open shared object file". The wheel is not yet
  # self-contained (no auditwheel/MKL vendoring), so the only place it imports
  # cleanly is the runner that built it. The wheel artifact is still uploaded
  # for the static layout check, which needs no shared libraries.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.13'
          activate-environment: tycho

      - name: Install conda clang toolchain
        shell: bash -el {0}
        # scikit-build-core picks CC/CXX from the activated conda env; the
        # conda-forge clang toolchain pins libstdc++ so the wheel imports
        # cleanly on any glibc-compatible distro.
        run: |
          conda install -n tycho -c conda-forge -y \
            clangxx_linux-64 clang_linux-64 \
            libstdcxx-devel_linux-64 sysroot_linux-64 \
            ninja

      - name: Install MKL via apt repository
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      - name: Build wheel
        shell: bash -el {0}
        run: |
          source /opt/intel/oneapi/setvars.sh
          pip wheel . --no-deps -w /tmp/wheels

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tycho-wheel
          path: /tmp/wheels/tychopy-*.whl
          if-no-files-found: error
          retention-days: 1

      # Install a parallel system Python 3.13 for the fresh import/test venvs
      # below. The wheel is cp313-cp313; ubuntu-latest's default Python is
      # 3.12, which would refuse the wheel.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Smoke-test wheel import (fresh venv, no setvars.sh)
        # Deliberately does NOT source /opt/intel/oneapi/setvars.sh: setvars.sh
        # exports LD_LIBRARY_PATH with the same MKL/iomp5 dirs the .so bakes
        # into rpath, which would mask an rpath bug. The .so must import via its
        # baked rpath alone (those dirs exist on this build runner).
        run: |
          set -euo pipefail
          wheel=$(ls /tmp/wheels/tychopy-*.whl | head -1)
          python3.13 -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip
          /tmp/wheel-venv/bin/pip install numpy
          /tmp/wheel-venv/bin/pip install "$wheel"
          so=$(ls /tmp/wheel-venv/lib/python3.13/site-packages/_tychopy*.so)
          echo "Bundled .so RUNPATH (informational):"
          readelf -d "$so" | grep -E 'RPATH|RUNPATH' || true
          /tmp/wheel-venv/bin/python -c "import _tychopy; import tychopy; print(_tychopy.__file__)"

      - name: Run pytest suite (against the installed wheel)
        env:
          MPLBACKEND: Agg
        # Fresh venv from the wheel's own [test] extra, then run the suite from
        # /tmp so the source ./tychopy package is NOT on sys.path — both
        # `import tychopy` (pure-Python layer) and `import _tychopy` (the .so)
        # resolve to the venv site-packages, i.e. the wheel. As with the smoke
        # test, no setvars.sh: a green run proves the packaged artifact works as
        # a user would import it.
        run: |
          set -euo pipefail
          # Expect exactly one wheel; a zero/multi-wheel build is a bug.
          shopt -s nullglob
          wheels=(/tmp/wheels/tychopy-*.whl)
          [ "${#wheels[@]}" -eq 1 ] || { echo "::error::expected one wheel, found ${#wheels[@]}"; exit 1; }
          wheel="${wheels[0]}"
          python3.13 -m venv /tmp/test-venv
          /tmp/test-venv/bin/pip install --upgrade pip
          /tmp/test-venv/bin/pip install "${wheel}[test]"
          # Copy the tests (and any in-tree fixtures) out of the checkout, then
          # run from /tmp so ./tychopy source is not importable.
          cp -r tychopy/test /tmp/suite
          cd /tmp
          /tmp/test-venv/bin/python -m pytest \
            --import-mode=importlib /tmp/suite --durations=10

  # ---------------------------------------------------------------------------
  # Static layout invariants on the packaged wheel (no import / no shared libs,
  # so this is safe to run on a bare runner from the uploaded artifact).
  # ---------------------------------------------------------------------------
  inspect-layout:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4   # for scripts/inspect_wheel_layout.py
      - uses: actions/download-artifact@v4
        with:
          name: tycho-wheel
          path: /tmp/wheels
      - name: Inspect wheel layout
        run: |
          set -euo pipefail
          wheel=$(ls /tmp/wheels/tychopy-*.whl | head -1)
          if [ -z "$wheel" ]; then
            echo "::error::no wheel artifact found"
            exit 1
          fi
          # Layout assertions are implemented in Python (see the script
          # for the negative/positive invariants). Avoids bash + awk
          # gotchas — an inline `awk 'NR>2 {print $1}'` previously
          # dropped the first zip entry because python -m zipfile -l
          # emits only one header row, not two.
          python scripts/inspect_wheel_layout.py "$wheel"
