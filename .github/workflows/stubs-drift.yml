name: stubs-drift

# Fast PR gates that do NOT require a _tychopy build. The actual stub-drift
# assertion (regenerate + diff) runs in docs-build.yml's build job, which
# already builds _tychopy for the Sphinx site — that is the single heavy
# binding-CI lane. This workflow stays cheap (~30 s per job) so contributors
# get fast feedback on stub-syntax / idempotency / default-config regressions
# without waiting for the docs build.

on:
  pull_request:
    paths:
      - 'tychopy/_stubs/**'
      - 'scripts/fix_stubs.py'
      - 'scripts/check_stubs_size.py'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/stubs-drift.yml'

concurrency:
  group: stubs-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stub-sanity:
    # Parse + idempotency checks operate on the committed snapshot only — no
    # binding build needed. The actual drift assertion (regenerate + diff)
    # lives in docs-build.yml.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: {submodules: false}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Verify committed stubs parse
        run: |
          python -c "
          import ast, pathlib, sys
          fail = False
          for p in pathlib.Path('tychopy/_stubs').rglob('*.pyi'):
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  print(f'::error file={p}::SyntaxError: {e}')
                  fail = True
          sys.exit(1 if fail else 0)
          "
      - name: fix_stubs.py is idempotent
        run: |
          python scripts/fix_stubs.py tychopy/_stubs/
          if ! git diff --quiet tychopy/_stubs/; then
            echo "::error::fix_stubs.py is not idempotent — re-running on a clean snapshot produced a diff"
            git diff tychopy/_stubs/
            exit 1
          fi

  default-config-no-docs:
    # Guards the BUILD_SPHINX_DOCS=OFF (default) configure path: catches
    # accidental refactors that would silently make Doxygen a hard requirement
    # for every contributor. Runs on a runner without doxygen installed.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - name: Verify doxygen is absent
        run: |
          if command -v doxygen >/dev/null; then
            echo "::error::doxygen unexpectedly installed — this lane cannot prove default-OFF works"
            exit 1
          fi
      - name: Install clang-21 via LLVM apt repo
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21
          sudo apt-get install -y libomp-dev lld ninja-build
      - name: Install MKL via apt repository
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel
      - name: Configure with default flags (no BUILD_SPHINX_DOCS)
        run: |
          source /opt/intel/oneapi/setvars.sh
          cmake --preset linux-clang-release \
            -DCMAKE_C_COMPILER=/usr/bin/clang-21 \
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++-21 \
            -B /tmp/build-smoke
