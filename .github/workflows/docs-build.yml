name: docs-build

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'include/tycho/**'
      - 'src/bindings/**'
      - 'tychopy/**'
      - 'scripts/fix_stubs.py'
      - 'scripts/check_stubs_size.py'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - '.github/workflows/docs-build.yml'
  push:
    branches: [main]

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.13'
          activate-environment: tycho

      - name: Install conda clang toolchain
        shell: bash -elo pipefail {0}
        # Match the wheel build's toolchain (see wheel-layout.yml) so the
        # _tychopy.so built here links against conda's libstdc++. This is
        # the same import-compatibility invariant CLAUDE.md documents for
        # `pip wheel .`; using the system clang here would risk silent
        # stubgen empty-output on libstdc++ mismatch.
        run: |
          conda install -n tycho -c conda-forge -y \
            clangxx_linux-64 clang_linux-64 \
            libstdcxx-devel_linux-64 sysroot_linux-64 \
            ninja

      - name: Install apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install MKL via apt repository
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      - name: Install Python deps
        shell: bash -elo pipefail {0}
        run: |
          conda install -n tycho -c conda-forge -y numpy scipy matplotlib spiceypy
          pip install nanobind
          pip install -r docs/requirements-docs.txt

      - name: Cache sphinx doctrees
        uses: actions/cache@v4
        with:
          path: build/docs/.doctrees
          key: doctrees-${{ runner.os }}-${{ hashFiles('docs/**', 'include/tycho/**', 'src/bindings/**') }}-${{ github.run_id }}
          restore-keys: |
            doctrees-${{ runner.os }}-${{ hashFiles('docs/**', 'include/tycho/**', 'src/bindings/**') }}-
            doctrees-${{ runner.os }}-

      - name: Configure + build _tychopy
        shell: bash -elo pipefail {0}
        run: |
          source /opt/intel/oneapi/setvars.sh
          cmake --preset linux-clang-conda -DBUILD_SPHINX_DOCS=ON
          cmake --build build -j$(nproc) --target _tychopy

      - name: Regenerate stubs and assert no drift
        # Runs BEFORE the slow docs build so drift failures surface fast.
        # tychopy_stubs_snapshot includes check_stubs_size.py + fix_stubs.py
        # as post-process steps.
        shell: bash -elo pipefail {0}
        run: |
          cmake --build build --target tychopy_stubs_snapshot
          if ! git diff --quiet tychopy/_stubs/; then
            echo "::error::Stub snapshot is stale. Drifted files:"
            git diff --name-only tychopy/_stubs/ | sed 's/^/  /'
            echo "::error::Run 'cmake --build build --target tychopy_stubs_snapshot' locally and commit the result."
            git diff tychopy/_stubs/
            exit 1
          fi
          echo "Stubs are in sync."

      - name: Build docs
        shell: bash -elo pipefail {0}
        run: cmake --build build -j2 --target tycho_docs

      - name: Run doctests
        shell: bash -elo pipefail {0}
        run: cmake --build build --target tycho_docs_doctest

      - name: VectorFunction Doxygen strict gate (full docstring coverage)
        shell: bash -elo pipefail {0}
        # Enforces that EVERY public symbol in the VectorFunction subsystem
        # carries a Doxygen docstring. Uses the committed, CMake-configured
        # build/docs/Doxyfile.vf-strict, which un-hides undocumented entities,
        # turns on WARN_IF_UNDOCUMENTED, counts @internal-documented helpers as
        # covered (INTERNAL_DOCS=YES), and sets WARN_AS_ERROR=FAIL_ON_WARNINGS
        # so an undocumented public VF symbol (or any doc error) fails the
        # build. The base Doxyfile stays permissive (WARN_AS_ERROR=NO) until
        # every subsystem reaches this standard; this scoped gate keeps the VF
        # subsystem at 100% public-symbol coverage.
        run: |
          if ! doxygen build/docs/Doxyfile.vf-strict; then
            echo "::error::VF subsystem has undocumented public symbols or doc errors:"
            cat build/docs/doxygen-vf-strict/warnings.log || true
            exit 1
          fi
          # FAIL_ON_WARNINGS still emits XML on a clean run; assert it exists.
          test -s build/docs/doxygen-vf-strict/xml/index.xml
          echo "VF subsystem Doxygen strict gate clean (100% public-symbol coverage)."

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html

      - name: Upload PR-preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html-${{ github.event.pull_request.number }}
          path: build/docs/html

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
