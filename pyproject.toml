[tool.ruff]
line-length = 88
exclude = [
    "dep/",
    "build/",
    "*.egg-info",
]

[tool.ruff.lint]
select = ["I"]  # isort only; formatting is handled by ruff format

[tool.ruff.format]
# Black-compatible formatting
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.isort]
profile = "black"
