[build-system]
requires = ["scikit-build-core>=0.9", "nanobind>=2.0"]
build-backend = "scikit_build_core.build"

[project]
name = "tychopy"
version = "0.1.0"
description = "High-speed, extensible, object-oriented trajectory design and optimization"
authors = [{ name = "Grant Hecht" }]
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
dependencies = [
    "numpy",
    "matplotlib",
    "spiceypy",
    "seaborn",
    "intel-openmp; sys_platform == 'win32'",
]

[project.optional-dependencies]
basemap = ["basemap"]
docs = ["sphinx", "furo", "breathe", "exhale"]

[project.urls]
Homepage = "https://github.com/GrantHecht/tycho"

[tool.scikit-build]
cmake.build-type = "Release"
# Pure-Python package collected from source tree; _tychopy extension installed via CMake install()
wheel.packages = ["tychopy"]
# Type-info marker (py.typed) and committed nanobind stub snapshot (_stubs/*.pyi)
# must travel inside the wheel so downstream IDEs/type-checkers see the API
# surface. Without these include patterns, scikit-build-core's default filter
# would not necessarily pick up non-.py files inside the package directory.
wheel.include = [
    "tychopy/py.typed",
    "tychopy/_stubs/**/*.pyi",
]

[tool.ruff]
line-length = 88
exclude = ["dep/", "build/", "*.egg-info"]

[tool.ruff.lint]
select = ["I"] # isort only; formatting is handled by ruff format

[tool.ruff.format]
# Black-compatible formatting
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.isort]
profile = "black"
